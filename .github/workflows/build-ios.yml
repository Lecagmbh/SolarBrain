name: Build & Deploy iOS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx vite build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        run: cd ios/App && pod install

      - name: Install Codemagic CLI tools
        run: pip3 install codemagic-cli-tools

      - name: Setup signing
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
        run: |
          # Decode API key
          echo -n "$APP_STORE_CONNECT_KEY_P8_BASE64" | base64 --decode > /tmp/AuthKey.p8

          # Create keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "ci-keychain" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "ci-keychain" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Fetch signing assets via App Store Connect API
          export APP_STORE_CONNECT_PRIVATE_KEY=$(cat /tmp/AuthKey.p8)

          app-store-connect fetch-signing-files "de.solarbrain.app" \
            --type IOS_APP_STORE \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @/tmp/AuthKey.p8 \
            --create

          keychain add-certificates --keychain $KEYCHAIN_PATH
          xcode-project use-profiles --project ios/App/App.xcodeproj

      - name: Build IPA
        run: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"

      - name: Upload to App Store Connect (TestFlight)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
        run: |
          echo -n "$APP_STORE_CONNECT_KEY_P8_BASE64" | base64 --decode > /tmp/AuthKey.p8
          export APP_STORE_CONNECT_PRIVATE_KEY=$(cat /tmp/AuthKey.p8)

          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @/tmp/AuthKey.p8

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SolarBrain-iOS
          path: build/ios/ipa/*.ipa
