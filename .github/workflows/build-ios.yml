name: Build & Deploy iOS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web (Capacitor)
        run: VITE_CAPACITOR=true npx vite build

      - name: Sync Capacitor iOS + CocoaPods
        run: |
          npx cap sync ios
          cd ios/App
          pod install --repo-update

      - name: Install Codemagic CLI tools
        run: pip3 install --break-system-packages codemagic-cli-tools

      - name: Decode P8 key
        env:
          APP_STORE_CONNECT_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
        run: |
          echo "$APP_STORE_CONNECT_KEY_P8_BASE64" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          chmod 600 $RUNNER_TEMP/AuthKey.p8
          echo "P8 key decoded: $(wc -c < $RUNNER_TEMP/AuthKey.p8) bytes"

      - name: Setup signing
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Generate RSA key for certificate signing
          openssl genrsa -out $RUNNER_TEMP/cert_key.pem 2048

          # Create keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "ci-keychain" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "ci-keychain" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Fetch signing assets — read key from file via python to avoid shell escaping
          python3 -c "
          import subprocess, sys
          with open('$RUNNER_TEMP/AuthKey.p8') as f:
              pk = f.read()
          with open('$RUNNER_TEMP/cert_key.pem') as f:
              ck = f.read()
          r = subprocess.run([
              'app-store-connect', 'fetch-signing-files', 'de.solarbrain.app',
              '--type', 'IOS_APP_STORE',
              '--key-id', '$APP_STORE_CONNECT_KEY_ID',
              '--issuer-id', '$APP_STORE_CONNECT_ISSUER_ID',
              '--private-key', pk,
              '--certificate-key', ck,
              '--create',
          ], capture_output=False)
          sys.exit(r.returncode)
          "

          keychain add-certificates --keychain $KEYCHAIN_PATH
          xcode-project use-profiles --project ios/App/App.xcodeproj

      - name: Build IPA
        run: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"

      - name: Upload to App Store Connect (TestFlight)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
        run: |
          PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_KEY_P8_BASE64" | base64 --decode)
          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$PRIVATE_KEY"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SolarBrain-iOS
          path: build/ios/ipa/*.ipa
