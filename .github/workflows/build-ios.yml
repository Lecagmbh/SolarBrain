name: Build & Deploy iOS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web (Capacitor)
        run: VITE_CAPACITOR=true npx vite build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install Codemagic CLI tools
        run: pip3 install --break-system-packages codemagic-cli-tools

      - name: Decode P8 key and verify
        env:
          APP_STORE_CONNECT_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          echo "$APP_STORE_CONNECT_KEY_P8_BASE64" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          chmod 600 $RUNNER_TEMP/AuthKey.p8
          echo "P8 key decoded: $(wc -c < $RUNNER_TEMP/AuthKey.p8) bytes"
          echo "Key ID length: ${#APP_STORE_CONNECT_KEY_ID}"
          echo "Issuer ID length: ${#APP_STORE_CONNECT_ISSUER_ID}"
          echo "Key starts with: $(head -1 $RUNNER_TEMP/AuthKey.p8)"
          # Test API call directly with python
          pip3 install --break-system-packages PyJWT cryptography 2>/dev/null
          python3 -c "
          import jwt, time, urllib.request, json
          with open('$RUNNER_TEMP/AuthKey.p8') as f:
              key = f.read()
          kid = '$APP_STORE_CONNECT_KEY_ID'
          iss = '$APP_STORE_CONNECT_ISSUER_ID'
          print(f'Key ID: {kid}')
          print(f'Issuer: {iss}')
          print(f'Key length: {len(key)} chars')
          token = jwt.encode({'iss': iss, 'iat': int(time.time()), 'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'}, key, algorithm='ES256', headers={'kid': kid})
          req = urllib.request.Request('https://api.appstoreconnect.apple.com/v1/apps', headers={'Authorization': f'Bearer {token}'})
          try:
              resp = urllib.request.urlopen(req)
              print(f'API TEST OK: {resp.status}')
          except urllib.error.HTTPError as e:
              print(f'API TEST FAILED: {e.code} - {e.read().decode()[:200]}')
          "

      - name: Setup signing
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Generate RSA key for certificate signing
          openssl genrsa -out $RUNNER_TEMP/cert_key.pem 2048

          # Use python for all signing operations to avoid shell escaping issues
          python3 << 'PYEOF'
          import subprocess, sys, os

          tmp = os.environ["RUNNER_TEMP"]

          with open(f'{tmp}/AuthKey.p8') as f:
              pk = f.read()
          with open(f'{tmp}/cert_key.pem') as f:
              ck = f.read()

          key_id = os.environ["APP_STORE_CONNECT_KEY_ID"]
          issuer_id = os.environ["APP_STORE_CONNECT_ISSUER_ID"]

          # Step 1: Revoke old certificates that we don't have keys for
          # First just try to fetch — if cert exists with matching key, great
          # If not, use --create which will handle it
          r = subprocess.run([
              'app-store-connect', 'fetch-signing-files', 'de.solarbrain.app',
              '--type', 'IOS_APP_STORE',
              '--key-id', key_id,
              '--issuer-id', issuer_id,
              '--private-key', pk,
              '--certificate-key', ck,
              '--create',
              '--delete-stale-profiles',
          ], capture_output=True, text=True)

          print(r.stdout)
          if r.stderr:
              print(r.stderr, file=sys.stderr)

          if r.returncode != 0:
              # Certificate limit reached — revoke oldest and retry
              print("First attempt failed, trying to revoke old certs...")
              # List certs
              lr = subprocess.run([
                  'app-store-connect', 'certificates', 'list',
                  '--type', 'DISTRIBUTION',
                  '--key-id', key_id,
                  '--issuer-id', issuer_id,
                  '--private-key', pk,
                  '--json',
              ], capture_output=True, text=True)
              print(lr.stdout[:500])

              import json
              try:
                  certs = json.loads(lr.stdout)
                  # Revoke oldest cert
                  if certs:
                      oldest = sorted(certs, key=lambda c: c.get('attributes', {}).get('expirationDate', ''))
                      if oldest:
                          cert_id = oldest[0].get('id')
                          print(f"Revoking cert: {cert_id}")
                          subprocess.run([
                              'app-store-connect', 'certificates', 'delete', cert_id,
                              '--key-id', key_id,
                              '--issuer-id', issuer_id,
                              '--private-key', pk,
                          ])
              except:
                  pass

              # Retry
              r = subprocess.run([
                  'app-store-connect', 'fetch-signing-files', 'de.solarbrain.app',
                  '--type', 'IOS_APP_STORE',
                  '--key-id', key_id,
                  '--issuer-id', issuer_id,
                  '--private-key', pk,
                  '--certificate-key', ck,
                  '--create',
              ], capture_output=False)
              sys.exit(r.returncode)

          PYEOF

          # Add certs to keychain
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project ios/App/App.xcodeproj

      - name: Build Archive
        run: |
          cd ios/App
          # Install provisioning profile so Xcode can find it
          PROFILE=$(ls ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -n "$PROFILE" ]; then
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp "$PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/
            echo "Profile installed: $(basename "$PROFILE")"
          fi

          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=UURWRHMHV8 \
            CODE_SIGN_IDENTITY=- \
            -allowProvisioningUpdates \
            2>&1 | tee /tmp/xcodebuild.log | tail -30

          # Check if archive succeeded (warnings are OK)
          if [ ! -d "$RUNNER_TEMP/App.xcarchive" ]; then
            echo "Archive failed. Full log:"
            cat /tmp/xcodebuild.log | grep "error:" | head -20
            exit 1
          fi
          echo "Archive OK"

      - name: Export IPA
        run: |
          cd ios/App

          # Get provisioning profile name
          PROFILE_NAME=$(ls ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          echo "Profile: $PROFILE_NAME"

          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>UURWRHMHV8</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

          IPA=$(find build -name "*.ipa" | head -1)
          echo "IPA: $IPA ($(du -h "$IPA" | cut -f1))"

      - name: Upload to App Store Connect (TestFlight)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
        run: |
          PRIVATE_KEY=$(echo "$APP_STORE_CONNECT_KEY_P8_BASE64" | base64 --decode)
          IPA_PATH=$(find ios/App/build -name "*.ipa" | head -1)
          echo "IPA: $IPA_PATH"
          app-store-connect publish \
            --path "$IPA_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$PRIVATE_KEY"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SolarBrain-iOS
          path: ios/App/build/ios/ipa/*.ipa
