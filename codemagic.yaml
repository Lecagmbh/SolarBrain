workflows:
  ios-release:
    name: SolarBrain iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: de.solarbrain.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "christian.zwick@lecagmbh.de"
        APPLE_TEAM_ID: "UURWRHMHV8"
      node: 20
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web
        script: |
          npx vite build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "de.solarbrain.app" --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        apple_id: christian.zwick@lecagmbh.de
        password: $APP_SPECIFIC_PASSWORD
        submit_to_testflight: true

  android-release:
    name: SolarBrain Android Release
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      vars:
        node: 20
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web
        script: |
          npx vite build
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build AAB
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
